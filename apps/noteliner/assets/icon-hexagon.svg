<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Same two-color purple gradient as icon-n-purple.svg -->
    <linearGradient id="hexGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#625C96"/>
      <stop offset="25%"  stop-color="#625C96"/>
      <stop offset="100%" stop-color="#322D58"/>
    </linearGradient>

    <!-- Hexagon-aligned rhombic facet pattern. Each rhombus has edges at 30°
         and 150° (matching the hexagon's slanted sides), forming a 60°/120°
         rhombus with horizontal long axis (aspect ratio √3 : 1 ≈ 1.732 : 1).

         Two-color tiling: the center rhombus of each tile is a single light
         diamond. The 4 corner triangles are all the same dark shade — when
         tiles tile, the 4 corners of 4 adjacent tiles combine to form a dark
         rhombus of identical shape, offset by half a tile diagonal. Adjacent
         rhombi alternate light/dark, making each diamond's silhouette crisply
         visible without internal grid lines. -->
    <pattern id="facets" x="13.52" y="-1.525" width="69.28" height="40" patternUnits="userSpaceOnUse">
      <!-- Light rhombus at tile center: one solid-color diamond -->
      <polygon points="0,20 34.64,0 69.28,20 34.64,40" fill="#ffffff" fill-opacity="0.06"/>
      <!-- 4 corner triangles with identical dark shade — combine across tile
           boundaries into full dark rhombi at each tile corner -->
      <polygon points="0,0 34.64,0 0,20"              fill="#000000" fill-opacity="0.11"/>
      <polygon points="34.64,0 69.28,0 69.28,20"      fill="#000000" fill-opacity="0.11"/>
      <polygon points="69.28,20 69.28,40 34.64,40"    fill="#000000" fill-opacity="0.11"/>
      <polygon points="0,20 34.64,40 0,40"            fill="#000000" fill-opacity="0.11"/>
    </pattern>

    <!-- Rounded-corner pointy-top hexagon (same geometry) -->
    <clipPath id="hexClip">
      <path d="M 264,40.619 L 438.526,141.381 A 16,16 0 0 1 446.526,155.238 L 446.526,356.762 A 16,16 0 0 1 438.526,370.619 L 264,471.381 A 16,16 0 0 1 248,471.381 L 73.474,370.619 A 16,16 0 0 1 65.474,356.762 L 65.474,155.238 A 16,16 0 0 1 73.474,141.381 L 248,40.619 A 16,16 0 0 1 264,40.619 Z"/>
    </clipPath>

    <!-- Soft drop shadow -->
    <filter id="letterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon interior: gradient + diamond-grid facet overlay, clipped to hexagon shape -->
  <g clip-path="url(#hexClip)">
    <rect width="512" height="512" fill="url(#hexGradient)"/>
  </g>

  <!-- White hexagon outline -->
  <path d="M 264,40.619 L 438.526,141.381 A 16,16 0 0 1 446.526,155.238 L 446.526,356.762 A 16,16 0 0 1 438.526,370.619 L 264,471.381 A 16,16 0 0 1 248,471.381 L 73.474,370.619 A 16,16 0 0 1 65.474,356.762 L 65.474,155.238 A 16,16 0 0 1 73.474,141.381 L 248,40.619 A 16,16 0 0 1 264,40.619 Z"
        fill="none" stroke="#221D48" stroke-width="30" stroke-linejoin="round"/>

  <!-- Font Awesome "code-branch" (classic, solid) glyph, replacing the "N".
       Source viewBox is 0 0 448 512; scaling by 0.5 gives a 224×256 glyph,
       translated by (154, 128) — 10px right of true center to optically
       balance the glyph's slight left-weighting within the hexagon. -->
  <g fill="#ffffff" filter="url(#letterShadow)" transform="translate(154, 128) scale(0.5)">
    <path d="M80 104c13.3 0 24-10.7 24-24s-10.7-24-24-24S56 66.7 56 80s10.7 24 24 24zm80-24c0 32.8-19.7 61-48 73.3V256h144c35.3 0 64-28.7 64-64V153.3C291.7 141 272 112.8 272 80c0-44.2 35.8-80 80-80s80 35.8 80 80c0 32.8-19.7 61-48 73.3V192c0 70.7-57.3 128-128 128H112v38.7c28.3 12.3 48 40.5 48 73.3c0 44.2-35.8 80-80 80s-80-35.8-80-80c0-32.8 19.7-61 48-73.3V153.3C19.7 141 0 112.8 0 80C0 35.8 35.8 0 80 0s80 35.8 80 80zm192 24c13.3 0 24-10.7 24-24s-10.7-24-24-24s-24 10.7-24 24s10.7 24 24 24zM80 456a24 24 0 1 0 0-48 24 24 0 1 0 0 48z"/>
  </g>
</svg>
