<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Orange-to-magenta vertical gradient matching the laan.me brand palette -->
    <linearGradient id="hexGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF9500"/>
      <stop offset="18%"  stop-color="#F77A2E"/>
      <stop offset="40%"  stop-color="#E0425A"/>
      <stop offset="65%"  stop-color="#B01E63"/>
      <stop offset="100%" stop-color="#7E0D4F"/>
    </linearGradient>

    <!-- Faceted diamond-triangle pattern -->
    <pattern id="facets" x="0" y="0" width="48" height="41.57" patternUnits="userSpaceOnUse">
      <polygon points="0,0 24,20.78 48,0"        fill="#ffffff" fill-opacity="0.07"/>
      <polygon points="0,41.57 24,20.78 48,41.57" fill="#000000" fill-opacity="0.09"/>
      <polygon points="0,0 0,41.57 24,20.78"     fill="#ffffff" fill-opacity="0.03"/>
      <polygon points="48,0 48,41.57 24,20.78"   fill="#000000" fill-opacity="0.05"/>
    </pattern>

    <!-- Rounded-corner pointy-top hexagon -->
    <clipPath id="hexClip">
      <path d="M 264,40.619 L 438.526,141.381 A 16,16 0 0 1 446.526,155.238 L 446.526,356.762 A 16,16 0 0 1 438.526,370.619 L 264,471.381 A 16,16 0 0 1 248,471.381 L 73.474,370.619 A 16,16 0 0 1 65.474,356.762 L 65.474,155.238 A 16,16 0 0 1 73.474,141.381 L 248,40.619 A 16,16 0 0 1 264,40.619 Z"/>
    </clipPath>

    <!-- Soft drop shadow -->
    <filter id="letterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#hexClip)">
    <rect width="512" height="512" fill="url(#hexGradient)"/>
    <rect width="512" height="512" fill="url(#facets)"/>
  </g>

  <path d="M 264,40.619 L 438.526,141.381 A 16,16 0 0 1 446.526,155.238 L 446.526,356.762 A 16,16 0 0 1 438.526,370.619 L 264,471.381 A 16,16 0 0 1 248,471.381 L 73.474,370.619 A 16,16 0 0 1 65.474,356.762 L 65.474,155.238 A 16,16 0 0 1 73.474,141.381 L 248,40.619 A 16,16 0 0 1 264,40.619 Z"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linejoin="round"/>

  <!-- Wordmark "NL": two letters side by side, 240h, stroke 42, 28px gap.
       N occupies 140×240 starting at x=122, L occupies 100×240 starting at x=290.
       Total span 268 wide, vertically centered at y=256. -->
  <g fill="#ffffff" filter="url(#letterShadow)">
    <!-- N: left bar, right bar, diagonal -->
    <rect x="122" y="136" width="42" height="240"/>
    <rect x="220" y="136" width="42" height="240"/>
    <polygon points="122,136 164,136 262,376 220,376"/>

    <!-- L: vertical bar, horizontal foot -->
    <rect x="290" y="136" width="42" height="240"/>
    <rect x="290" y="334" width="100" height="42"/>
  </g>
</svg>
