<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Rounded-corner pointy-top hexagon. Vertices at radius 220 from (256,256);
         corner radius 16; edge tangent-point offset = 16 * tan(30°) ≈ 9.238. -->
    <clipPath id="hexClip">
      <path d="M 264,40.619 L 438.526,141.381 A 16,16 0 0 1 446.526,155.238 L 446.526,356.762 A 16,16 0 0 1 438.526,370.619 L 264,471.381 A 16,16 0 0 1 248,471.381 L 73.474,370.619 A 16,16 0 0 1 65.474,356.762 L 65.474,155.238 A 16,16 0 0 1 73.474,141.381 L 248,40.619 A 16,16 0 0 1 264,40.619 Z"/>
    </clipPath>
  </defs>

  <!-- Hexagon interior: gradient + faceted overlay, clipped to hexagon shape -->
  <g clip-path="url(#hexClip)">
    <rect width="512" height="512" fill="#ffffff"/>
  </g>
    <text x="256" y="350"
        font-family="'Bookman Old Style', 'Georgia', 'Times New Roman', serif"
        font-weight="900" font-size="380"
        text-anchor="middle"
        fill="#a02550"
        stroke="#1a1a1a" stroke-width="28"
        stroke-linejoin="round"
        paint-order="stroke fill">n</text>

  <!-- White hexagon outline -->
  <path d="M 264,40.619 L 438.526,141.381 A 16,16 0 0 1 446.526,155.238 L 446.526,356.762 A 16,16 0 0 1 438.526,370.619 L 264,471.381 A 16,16 0 0 1 248,471.381 L 73.474,370.619 A 16,16 0 0 1 65.474,356.762 L 65.474,155.238 A 16,16 0 0 1 73.474,141.381 L 248,40.619 A 16,16 0 0 1 264,40.619 Z"
        fill="none" stroke="#000000" stroke-width="30" stroke-linejoin="round"/>

</svg>
