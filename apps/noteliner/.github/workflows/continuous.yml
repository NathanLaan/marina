name: Continuous Build

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight builds when a newer commit lands. Without this, two pushes
# minutes apart race each other into GitHub Releases under the same tag.
concurrency:
  group: continuous-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # rev-list --count needs the full history.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Compose <major>.<minor>.<build>-build.<N>+<githash>:
      #   base    = package.json "version" (semver triplet, e.g. 0.6.2)
      #   build N = git commit count (monotone, even across patch bumps)
      #   hash    = short SHA, as semver build-metadata (ignored by ordering)
      - name: Compute version
        id: ver
        shell: bash
        run: |
          BASE=$(node -p "require('./package.json').version")
          BUILD=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          FULL="${BASE}-build.${BUILD}+${HASH}"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"

      # Mutates package.json + package-lock.json in the runner workspace only;
      # never pushed back. electron-builder reads this when naming the release
      # and writing latest*.yml.
      - name: Stamp package.json version
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.ver.outputs.full }}"

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            imagemagick

      - name: Build & publish
        run: npm run release
        env:
          # GitHub token is required for publishing to a Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Mark the GitHub Release as a pre-release. Pairs with the
          # build.N semver pre-release token so the stable channel
          # (tag-driven release.yml) always wins on version comparison.
          EP_PRE_RELEASE: 'true'

          # Force the About dialog to display the full continuous-build
          # version instead of vite.config.mjs's "<semver>-dev.<hash>"
          # fallback for non-tag builds.
          APP_VERSION_OVERRIDE: ${{ steps.ver.outputs.full }}

          # macOS code signing + notarization. All optional — without them
          # the build is unsigned and Gatekeeper will block first launch.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # Windows code signing. Optional — without it SmartScreen will warn.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: builder-output-${{ matrix.os }}
          path: |
            dist-electron/
          retention-days: 7
